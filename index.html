<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-512.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --bg: #000000;
    --card: #161616;
    --card2: #1C1C1C;
    --border: #262626;
    --text: #F5F5F5;
    --muted: #8B8B8B;
    --accent: #F25623;
    --ring-track: #2A2A2A;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    padding-bottom: 40px;
  }
  header {
    padding: 24px 18px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  h1 {
    font-size: 30px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .icon-btn {
    width: 42px;
    height: 42px;
    border-radius: 21px;
    background: var(--card2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
  }
  .header-actions {
    display: flex;
    gap: 10px;
  }

  main { padding: 4px 16px; max-width: 480px; margin: 0 auto; }

  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 18px;
    position: relative;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .ring {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    position: relative;
  }
  .ring svg { position: absolute; top: 0; left: 0; }
  .ring-label { position: relative; z-index: 1; }

  .dots-icon {
    color: var(--muted);
    font-size: 16px;
    letter-spacing: 1px;
  }

  .big-num {
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
  }
  .big-num .unit {
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    margin-left: 3px;
  }

  .card-label {
    font-size: 14px;
    font-weight: 600;
    margin-top: 14px;
  }
  .card-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .calendar-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 34px 18px;
    margin-bottom: 12px;
  }
  .month-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
  }
  .month-block {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .month-name {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }
  .dot-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: min-content;
    column-gap: 7px;
    row-gap: 9px;
    justify-items: center;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ring-track);
  }
  .dot.on { background: var(--text); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 0;
  }
  .task-check {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 2px solid var(--ring-track);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    color: transparent;
  }
  .task-check.done {
    background: var(--text);
    border-color: var(--text);
    color: #000;
  }
  .task-info { flex: 1; }
  .task-name { font-size: 14px; font-weight: 600; }
  .task-name.done-text { color: #6B6B6B; text-decoration: line-through; }
  .task-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-title { font-size: 15px; font-weight: 700; }
  .section-tag {
    font-size: 11px;
    color: var(--muted);
    background: var(--card2);
    padding: 4px 10px;
    border-radius: 10px;
  }

  .volume-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 18px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .volume-left .card-label { margin-top: 4px; }

  .date-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 16px 14px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .date-strip::-webkit-scrollbar { display: none; }
  .date-chip {
    min-width: 52px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 0;
    text-align: center;
    flex-shrink: 0;
  }
  .date-chip.active {
    background: var(--text);
  }
  .date-chip.active .chip-day, .date-chip.active .chip-num { color: #000; }
  .chip-day { font-size: 10px; color: var(--muted); font-weight: 600; }
  .chip-num { font-size: 15px; font-weight: 700; margin-top: 2px; }

  .bottom-nav {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 10px 18px;
    display: flex;
    gap: 22px;
  }
  .nav-icon { color: var(--muted); font-size: 18px; }

  .loading { text-align: center; color: var(--muted); padding: 40px; }
</style>
</head>
<body>

<header>
  <h1 id="title">Tracker</h1>
  <div class="header-actions">
    <div class="icon-btn">⚙</div>
  </div>
</header>

<div class="date-strip" id="dateStrip"></div>

<main id="main">
  <div class="loading">Loading...</div>
</main>

<script>
const WORKOUT_DAYS = [1, 3, 5]; // Mon, Wed, Fri

const MORNING_TASKS = [
  { id: 'wall_stand', name: 'Wall stand', meta: '2 min' },
  { id: 'cat_cow', name: 'Cat-cow stretch', meta: '10 reps' },
  { id: 'cobra', name: 'Cobra stretch', meta: '30 sec x 2' },
  { id: 'chin_tuck', name: 'Chin tucks', meta: '10 reps' },
];

const WORKOUT_TASKS = [
  { id: 'warmup', name: 'Warm-up', meta: '5 min' },
  { id: 'pushup', name: 'Pushups', meta: '3 x 8-12' },
  { id: 'rows', name: 'Australian rows', meta: '3 x 8-10' },
  { id: 'squats', name: 'Bodyweight squats', meta: '3 x 15' },
  { id: 'lunges', name: 'Lunges', meta: '3 x 10 each leg' },
  { id: 'plank', name: 'Plank', meta: '3 x 20-30 sec' },
  { id: 'leg_raise', name: 'Leg raises', meta: '3 x 10' },
  { id: 'superman', name: 'Superman hold', meta: '3 x 15 sec' },
];

const RECOVERY_TASKS = [
  { id: 'walk', name: 'Morning walk', meta: '20-30 min' },
  { id: 'stretch', name: 'Stretching', meta: '10 min' },
];

function formatDateKey(d) { return d.toISOString().split('T')[0]; }
function isWorkoutDay(d) { return WORKOUT_DAYS.includes(d.getDay()); }
function tasksFor(d) {
  return isWorkoutDay(d) ? [...MORNING_TASKS, ...WORKOUT_TASKS] : [...MORNING_TASKS, ...RECOVERY_TASKS];
}

let currentDate = new Date();
let currentData = {};
let weekDates = [];

function buildWeekStrip(centerDate) {
  weekDates = [];
  for (let i = -3; i <= 3; i++) {
    const d = new Date(centerDate);
    d.setDate(d.getDate() + i);
    weekDates.push(d);
  }
  const dayNames = ['S','M','T','W','T','F','S'];
  dateStrip.innerHTML = weekDates.map(d => {
    const active = formatDateKey(d) === formatDateKey(currentDate);
    return `<div class="date-chip ${active ? 'active' : ''}" data-date="${formatDateKey(d)}">
      <div class="chip-day">${dayNames[d.getDay()]}</div>
      <div class="chip-num">${d.getDate()}</div>
    </div>`;
  }).join('');
  dateStrip.querySelectorAll('.date-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      currentDate = new Date(chip.dataset.date);
      loadDay(currentDate);
    });
  });
}

async function loadDay(date) {
  const key = `day:${formatDateKey(date)}`;
  main.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const raw = localStorage.getItem(key);
    currentData = raw ? JSON.parse(raw) : {};
  } catch (e) {
    currentData = {};
  }
  buildWeekStrip(date);
  await render(date);
}

async function saveDay(date, data) {
  const key = `day:${formatDateKey(date)}`;
  try { localStorage.setItem(key, JSON.stringify(data)); }
  catch (e) { console.error(e); }
}

function ringSvg(pct, size) {
  const r = (size - 4) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return `<svg width="${size}" height="${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="#2A2A2A" stroke-width="3" fill="none"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="#F5F5F5" stroke-width="3" fill="none"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})"/>
  </svg>`;
}

async function render(date) {
  const tasks = tasksFor(date);
  const doneCount = tasks.filter(t => currentData[t.id]).length;
  const pct = tasks.length ? Math.round((doneCount / tasks.length) * 100) : 0;
  const workoutDay = isWorkoutDay(date);

  let html = '';

  // Top two cards: progress ring + streak count
  html += `<div class="row-2">
    <div class="card">
      <div class="card-top">
        <div class="ring">
          ${ringSvg(pct, 46)}
          <div class="ring-label">${doneCount}</div>
        </div>
        <div class="dots-icon">⋮</div>
      </div>
      <div class="card-label">${workoutDay ? 'Workout Day' : 'Recovery Day'}</div>
      <div class="card-sub">${doneCount}/${tasks.length} done</div>
    </div>
    <div class="card">
      <div class="card-top">
        <div class="big-num">${pct}<span class="unit">%</span></div>
        <div class="dots-icon">⋮</div>
      </div>
      <div class="card-label">Today's Progress</div>
      <div class="card-sub" id="lastUpdated">—</div>
    </div>
  </div>`;

  // Calendar dot grid (last 3 months)
  html += await calendarCardHtml(date);

  // Task list card
  html += `<div class="card" style="margin-bottom:12px;">
    <div class="section-header">
      <div class="section-title">${workoutDay ? '💪 Workout' : '🚶 Recovery'}</div>
      <div class="section-tag">${doneCount}/${tasks.length}</div>
    </div>
    <div class="divider"></div>`;

  tasks.forEach(t => {
    const done = !!currentData[t.id];
    html += `<div class="task-row" id="task_${t.id}">
      <div class="task-check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
      <div class="task-info">
        <div class="task-name ${done ? 'done-text' : ''}">${t.name}</div>
        <div class="task-sub">${t.meta}</div>
      </div>
    </div>`;
  });

  html += `</div>`;

  // Volume-lifted style summary (7 day completion)
  const weeklyPct = await weeklyCompletionPct(date);
  html += `<div class="volume-card">
    <div class="volume-left">
      <div class="card-sub">Last 7 days</div>
      <div class="card-label" style="margin-top:6px; font-size:18px;">${weeklyPct}<span style="color:var(--muted); font-size:12px; margin-left:4px;">% avg</span></div>
    </div>
    <div class="dots-icon">⋮</div>
  </div>`;

  main.innerHTML = html;

  tasks.forEach(t => {
    document.getElementById('task_' + t.id).addEventListener('click', () => toggleTask(t.id));
  });
}

async function toggleTask(id) {
  currentData[id] = !currentData[id];
  await saveDay(currentDate, currentData);
  render(currentDate);
}

async function calendarCardHtml(centerDate) {
  const months = [];
  for (let i = 2; i >= 0; i--) {
    const d = new Date(centerDate.getFullYear(), centerDate.getMonth() - i, 1);
    months.push(d);
  }
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let blocks = [];
  for (const m of months) {
    const daysInMonth = new Date(m.getFullYear(), m.getMonth() + 1, 0).getDate();
    let dots = '';
    for (let day = 1; day <= Math.min(daysInMonth, 28); day++) {
      const d = new Date(m.getFullYear(), m.getMonth(), day);
      let filled = false;
      if (d <= new Date()) {
        const key = `day:${formatDateKey(d)}`;
        try {
          const raw = localStorage.getItem(key);
          if (raw) {
            const data = JSON.parse(raw);
            const dTasks = tasksFor(d);
            const dDone = dTasks.filter(t => data[t.id]).length;
            filled = dDone >= Math.ceil(dTasks.length * 0.6);
          }
        } catch (e) {}
      }
      dots += `<div class="dot ${filled ? 'on' : ''}"></div>`;
    }
    blocks.push(`<div class="month-block">
      <div class="month-name">${monthNames[m.getMonth()]}</div>
      <div class="dot-grid">${dots}</div>
    </div>`);
  }

  return `<div class="calendar-card">
    <div class="month-row">${blocks.join('')}</div>
  </div>`;
}

async function weeklyCompletionPct(centerDate) {
  let total = 0, sum = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(centerDate);
    d.setDate(d.getDate() - i);
    if (d > new Date()) continue;
    const key = `day:${formatDateKey(d)}`;
    try {
      const raw = localStorage.getItem(key);
      if (raw) {
        const data = JSON.parse(raw);
        const dTasks = tasksFor(d);
        const dDone = dTasks.filter(t => data[t.id]).length;
        sum += (dDone / dTasks.length) * 100;
        total++;
      } else { total++; }
    } catch (e) { total++; }
  }
  return total ? Math.round(sum / total) : 0;
}

const dateStrip = document.getElementById('dateStrip');
const main = document.getElementById('main');

loadDay(currentDate);
</script>

</body>
</html>
